<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 70" width="280" height="70">
  <!-- Sun ray decoration -->
  <g transform="translate(140, 8)" opacity="0.6">
    <line x1="0" y1="-6" x2="0" y2="0" stroke="#7B2D3B" stroke-width="1" stroke-linecap="round"/>
    <line x1="4.2" y1="-4.2" x2="0" y2="0" stroke="#7B2D3B" stroke-width="0.8" stroke-linecap="round"/>
    <line x1="-4.2" y1="-4.2" x2="0" y2="0" stroke="#7B2D3B" stroke-width="0.8" stroke-linecap="round"/>
    <line x1="5.8" y1="-1.5" x2="0" y2="0" stroke="#7B2D3B" stroke-width="0.6" stroke-linecap="round"/>
    <line x1="-5.8" y1="-1.5" x2="0" y2="0" stroke="#7B2D3B" stroke-width="0.6" stroke-linecap="round"/>
    <line x1="3" y1="-5.2" x2="0" y2="0" stroke="#7B2D3B" stroke-width="0.7" stroke-linecap="round"/>
    <line x1="-3" y1="-5.2" x2="0" y2="0" stroke="#7B2D3B" stroke-width="0.7" stroke-linecap="round"/>
  </g>
  <!-- LITTLE RED text -->
  <text x="140" y="38" text-anchor="middle" font-family="'Cormorant Garamond', 'Georgia', serif" font-size="26" font-weight="600" letter-spacing="8" fill="#4A1A24">LITTLE RED</text>
  <!-- Thin decorative line -->
  <line x1="60" y1="44" x2="220" y2="44" stroke="#C9A96E" stroke-width="0.5" opacity="0.5"/>
  <!-- esthetics text -->
  <text x="140" y="60" text-anchor="middle" font-family="'Cormorant Garamond', 'Georgia', serif" font-size="18" font-weight="400" font-style="italic" letter-spacing="4" fill="#5C1E2B">esthetics</text>
</svg>
